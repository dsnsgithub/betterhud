# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: push

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: install xvfb
        # Provides a virtual display so the Minecraft client can launch headlessly.
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: launch minecraft client with mod
        # Boots a production Fabric client with the built jar and all dependency
        # mods, and fails the build if the game does not reach the title screen.
        run: ./gradlew runProductionClientGameTest
      - name: capture game logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: client-launch-test
          path: |
            run/logs/
            run/screenshots/
          if-no-files-found: ignore
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/

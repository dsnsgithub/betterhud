plugins {
	id 'dev.kikugie.stonecutter'
}

stonecutter.active('26.2') /* [SC] DO NOT EDIT */

tasks.register('modrinthBundle') {
	group = 'publishing'
	description = 'Collects the release jars and the per-jar Minecraft version ranges for Modrinth.'

	def variants = file('versions').listFiles().findAll { it.directory }*.name.sort()
	variants.each { dependsOn(":${it}:build") }

	doLast {
		def outDir = file('build/modrinth')
		outDir.deleteDir()
		outDir.mkdirs()

		def rows = []
		variants.each { variant ->
			def jar = file("versions/${variant}/build/libs").listFiles().find {
				it.name.endsWith('.jar') && !it.name.contains('-sources')
			}
			if (jar == null) {
				throw new GradleException("No release jar found for variant ${variant} in versions/${variant}/build/libs")
			}
			java.nio.file.Files.copy(jar.toPath(), new File(outDir, jar.name).toPath())

			def props = new Properties()
			file("versions/${variant}/gradle.properties").withInputStream { props.load(it) }
			rows << "| `${jar.name}` | `${props.getProperty('mc_dep')}` |"
		}

		def manifest = new File(outDir, 'UPLOAD.md')
		manifest.text = [
			"# Modrinth upload — betterhud ${project.mod_version}",
			'',
			'Upload each jar below as its own Modrinth version, selecting every',
			'Minecraft release in its range. Loader: Fabric. Required',
			'dependencies: Fabric API, Cloth Config, Mod Menu.',
			'',
			'| File | Minecraft versions |',
			'| --- | --- |',
			*rows,
			''
		].join('\n')

		println()
		println manifest.text
		println "Bundle written to ${outDir}"
	}
}

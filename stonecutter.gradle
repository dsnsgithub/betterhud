plugins {
	id 'dev.kikugie.stonecutter'
}

stonecutter.active('26.2') /* [SC] DO NOT EDIT */

def supportedVersions = new groovy.json.JsonSlurper().parse(file('supported-versions.json'))
def gameVersionsByVariant = [:]
supportedVersions.each { mc, info ->
	gameVersionsByVariant.computeIfAbsent(info.variant) { [] } << mc
}

tasks.register('modrinthBundle') {
	group = 'publishing'
	description = 'Collects the release jars and the per-jar Minecraft version lists for Modrinth.'
	gameVersionsByVariant.keySet().each { dependsOn(":${it}:build") }

	doLast {
		def outDir = file('build/modrinth')
		outDir.deleteDir()
		outDir.mkdirs()

		def rows = []
		gameVersionsByVariant.each { variant, gameVersions ->
			def jar = file("versions/${variant}/build/libs").listFiles().find {
				it.name.endsWith('.jar') && !it.name.contains('-sources')
			}
			if (jar == null) {
				throw new GradleException("No release jar found for variant ${variant} in versions/${variant}/build/libs")
			}
			java.nio.file.Files.copy(jar.toPath(), new File(outDir, jar.name).toPath())
			rows << "| `${jar.name}` | ${gameVersions.join(', ')} |"
		}

		println "Bundle written to ${outDir}"
	}
}

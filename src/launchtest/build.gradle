plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}" apply false
	id 'net.fabricmc.fabric-loom' version "${loom_version}" apply false
}

def versionKey = { String v -> v.tokenize('.').collect { it.padLeft(4, '0') }.join('.') }
def variantsDir = new File(rootDir, 'versions')
def variants = variantsDir.listFiles().findAll { it.directory }*.name.sort { versionKey(it) }

def variantProps = { String variant ->
	def props = new Properties()
	new File(variantsDir, "${variant}/gradle.properties").withInputStream { props.load(it) }
	props
}

def testMcVersion = providers.gradleProperty('testMcVersion')
	.getOrElse(variantProps(variants.last()).getProperty('minecraft_version'))

def coveringVariants = variants.findAll { versionKey(it) <= versionKey(testMcVersion) }
if (coveringVariants.isEmpty()) {
	throw new GradleException("No build variant covers Minecraft ${testMcVersion}")
}
def variant = coveringVariants.last()

def props = variantProps(variant)
def loaderVersion = props.getProperty('loader_version')
def javaVersionInt = Integer.parseInt(props.getProperty('java_version'))

def isLegacy = variant.startsWith('1.')
apply plugin: isLegacy ? 'net.fabricmc.fabric-loom-remap' : 'net.fabricmc.fabric-loom'

version = '1.0.0'
base {
	archivesName = 'betterhud-launchtest'
}

repositories {
	maven { url 'https://maven.shedaniel.me/' }
	maven { url 'https://maven.terraformersmc.com/releases/' }
}

if (!isLegacy) {
	configurations.configureEach {
		if (name.toLowerCase().contains('annotationprocessor')) {
			exclude group: 'org.ow2.asm'
		}
	}
}

def modrinthLatest = { String slug ->
	def query = "https://api.modrinth.com/v2/project/${slug}/version" +
			"?game_versions=%5B%22${testMcVersion}%22%5D&loaders=%5B%22fabric%22%5D"
	def found = new groovy.json.JsonSlurper().parse(new URI(query).toURL())
	if (found.isEmpty()) {
		throw new GradleException("No ${slug} release on Modrinth supports Minecraft ${testMcVersion}")
	}
	found.first().version_number
}

def fabricApiVersion = modrinthLatest('fabric-api')
def modmenuVersion = modrinthLatest('modmenu')
def clothConfigVersion = modrinthLatest('cloth-config').replace('+fabric', '')

dependencies {
	minecraft "com.mojang:minecraft:${testMcVersion}"

	if (isLegacy) {
		mappings loom.officialMojangMappings()
		modImplementation "net.fabricmc:fabric-loader:${loaderVersion}"
		modImplementation "net.fabricmc.fabric-api:fabric-api:${fabricApiVersion}"
	} else {
		implementation "net.fabricmc:fabric-loader:${loaderVersion}"
		implementation "net.fabricmc.fabric-api:fabric-api:${fabricApiVersion}"
	}

	productionRuntimeMods("net.fabricmc.fabric-api:fabric-api:${fabricApiVersion}") { transitive = false }
	productionRuntimeMods("com.terraformersmc:modmenu:${modmenuVersion}") { transitive = false }
	productionRuntimeMods("me.shedaniel.cloth:cloth-config-fabric:${clothConfigVersion}") { transitive = false }
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = javaVersionInt
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(javaVersionInt)
	}
}

evaluationDependsOn(":${variant}")
def variantProject = project(":${variant}")
def variantJarTask = variantProject.tasks.names.contains('remapJar') ? 'remapJar' : 'jar'
def ownJarTask = tasks.names.contains('remapJar') ? 'remapJar' : 'jar'

tasks.register('runLaunchTest', net.fabricmc.loom.task.prod.ClientProductionRunTask) {
	mods.setFrom(variantProject.tasks.named(variantJarTask), tasks.named(ownJarTask), configurations.productionRuntimeMods)
	programArgs.addAll('--quickPlaySingleplayer', 'ci-world')

	doFirst {
		if (!file('run/saves/ci-world').exists()) {
			throw new GradleException("Missing test world at src/launchtest/run/saves/ci-world. " +
					"Generate it with: bash .github/scripts/generate-test-world.sh ${testMcVersion}")
		}
		def options = new File(runDir.get().asFile, 'options.txt')
		if (!options.exists()) {
			options.parentFile.mkdirs()
			options.text = 'onboardAccessibility:false\n'
		}
	}
}
